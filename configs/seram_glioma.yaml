data:
  source-h5: /mnt/home/users/tic_163_uma/mpascual/fscratch/datasets/gliomas/source_data.h5
  experts-dir: /mnt/home/users/tic_163_uma/mpascual/fscratch/datasets/gliomas/experts
  spacings: [3mm, 5mm, 7mm]
  pulses: [t1c, t2w, t2f]
  models: [BSPLINE, ECLARE]
  kfolds: 5
  seed: 42
  out: /media/mpascual/Sandisk2TB/research/pacs_sr/data/gliomas/seram_manifest.json


synthseg:
  # SynthSeg command (subprocess-isolated from main env to avoid TF/Keras conflicts)
  # Option 1: Standalone repo (recommended for HPC without FreeSurfer)
  command:
    - "/mnt/home/users/tic_163_uma/mpascual/fscratch/tools/synthseg_env/bin/python"
    - "/mnt/home/users/tic_163_uma/mpascual/fscratch/tools/SynthSeg/scripts/commands/SynthSeg_predict.py"
  # Option 2: FreeSurfer binary
  # command: ["mri_synthseg"]

  # SynthSeg parameters
  robust: true            # Use robust model (--robust flag)
  threads: 1              # CPU threads per SynthSeg invocation
  crop: 0                 # Crop size (divisible by 32, 0 = default 192)

  # Evaluation scope
  methods: ["HR", "BSPLINE", "ECLARE", "PACS_SR"]
  spacings: ["3mm", "5mm", "7mm"]
  pulse: "t1c"            # T1 only per hypothesis

  # Statistical analysis
  alpha: 0.05
  correction: "fdr_bh"    # Benjamini-Hochberg FDR
  reference_method: "PACS_SR"

  # Output
  output_dir: "/media/mpascual/Sandisk2TB/research/pacs_sr/results_synthseg"
  cleanup_nifti: true     # Set true on HPC to reduce inode usage

registration:
  atlas: /dev/null
  t1: T1_brain.nii
  t2: T2_brain.nii
  epi: EPI_brain.nii
  pd: PD_brain.nii
  brain_mask: brain_mask.nii

pacs_sr:
  experiment_name: "SERAM_GLI"
  patch_size: 32
  stride: 16
  mixing_window: "hann"
  simplex: true
  lambda_ridge: 1.0e-4
  laplacian_tau: 0.10
  lambda_edge: 0.25
  edge_power: 2.0
  lambda_grad: 0.2
  grad_operator: "sobel"
  normalize: "zscore"
  use_registration: false
  num_workers: 12
  parallel_backend: "loky"
  device: "cpu"
  compute_lpips: false
  compute_kid: false
  ssim_axis: "axial"
  evaluate_train: false
  save_weight_volumes: true
  save_blends: true
  log_level: "INFO"
  log_to_file: true
  log_region_freq: 10
  disable_tqdm: true
  out_root: /mnt/home/users/tic_163_uma/mpascual/fscratch/datasets/gliomas/experts
